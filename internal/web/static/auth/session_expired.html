<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Session Expired — Crescendo</title>
  <link rel="stylesheet" href="/src/output.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/output.css">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js" integrity="sha384-H5SrcfygHmAuTDZphMHqBJLc3FhssKjG7w/CeCpFReSfwBWDTKpkzPP8c+cLsK+V" crossorigin="anonymous"></script>
</head>

<body id="body" hx-boost="true">
<div class="page-shell">

  <!-- Floating music notes (ambient) -->
  <span class="float-note float-note-1" aria-hidden="true">♩</span>
  <span class="float-note float-note-2" aria-hidden="true">♪</span>
  <span class="float-note float-note-3" aria-hidden="true">♫</span>
  <span class="float-note float-note-4" aria-hidden="true">♩</span>

  <!-- ── CARD ─────────────────────────────────────────────────────────── -->
  <div class="expire-card">

    <!-- Logo -->
    <a href="/" class="inline-flex items-center gap-2 mb-7 self-center">
      <div class="flex items-end gap-0.75" style="height:18px">
        <div class="wbar bg-brand animate-bar1" style="height:35%;"></div>
        <div class="wbar bg-brand animate-bar2" style="height:65%;"></div>
        <div class="wbar bg-brand animate-bar3" style="height:100%;"></div>
        <div class="wbar bg-brand animate-bar4" style="height:60%;"></div>
        <div class="wbar bg-brand animate-bar5" style="height:30%;"></div>
      </div>
      <span class="font-display text-ink text-[1.35rem] tracking-tight leading-none">Crescendo</span>
    </a>

    <!-- Icon -->
    <div class="icon-ring mb-5">
      <div class="icon-bg">
        <!-- Clock / timer icon — universally understood as "time out" -->
        <svg width="28" height="28" fill="none" viewBox="0 0 24 24"
             stroke="#4F46E5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/>
          <path d="M12 7v5l3.5 2"/>
          <!-- Small lock overlay hint -->
        </svg>
      </div>
    </div>

    <!-- Heading -->
    <h1 class="font-display text-[1.6rem] text-ink leading-tight tracking-tight mb-2">
      Session Expired
    </h1>

    <!-- Body copy -->
    <p class="text-sm text-ink-secondary leading-relaxed max-w-xs">
      Your session timed out after a period of inactivity.
      Sign in again to pick up right where you left off.
    </p>

    <!-- Divider -->
    <div class="card-divider"></div>

    <!-- CTA -->
    <a hx-get="{{.LoginUrl}}" hx-swap="outerHTML" hx-target="#body" class="btn-login">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24"
           stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15"/>
        <path d="M12 12h9m0 0-3-3m3 3-3 3"/>
      </svg>
      Back to Login
    </a>

    <!-- Footer note -->
    <p class="text-xs text-ink-disabled mt-4">
      Your data is safe. Nothing was lost.
    </p>

    <!-- Decorative mini waveform -->
    <div class="footer-bars" aria-hidden="true">
      <div class="waveform-bar animate-bar1" style="height:8px;  opacity:1;"></div>
      <div class="waveform-bar animate-bar2" style="height:14px; opacity:1;"></div>
      <div class="waveform-bar animate-bar3" style="height:20px; opacity:1;"></div>
      <div class="waveform-bar animate-bar4" style="height:14px; opacity:1;"></div>
      <div class="waveform-bar animate-bar5" style="height:8px;  opacity:1;"></div>
      <div class="waveform-bar animate-bar1" style="height:5px;  opacity:1;"></div>
    </div>

  </div>
  <!-- /card -->

  <!-- Below-card brand line -->
  <p class="mt-6 text-xs text-ink-disabled animate-fade-up-d2">
    &copy; 2025 Crescendo — Music &amp; Concert Discovery
  </p>

</div>
</body>
</html>
