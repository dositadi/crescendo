<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment — Crescendo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/src/output.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js" integrity="sha384-H5SrcfygHmAuTDZphMHqBJLc3FhssKjG7w/CeCpFReSfwBWDTKpkzPP8c+cLsK+V" crossorigin="anonymous"></script>
</head>
<body class="min-h-screen flex flex-col text-ink">


  <!-- ═══════════════════════════════════════════════════════════════════════
       CSS-ONLY VIEW TOGGLE RADIOS  (must be siblings of .page-* wrappers)
  ════════════════════════════════════════════════════════════════════════════ -->
  <input type="radio" name="view" id="view-payment" checked />
  <input type="radio" name="view" id="view-receipt" />


  <!-- ═══════════════════════════════════════════════════════════════════════
       HEADER
  ════════════════════════════════════════════════════════════════════════════ -->
  <!-- HEADER -->
<header class="sticky top-0 z-50 bg-surface-white border-b border-border-soft shadow-sm">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center gap-3 h-15">

      <!-- Back button -->
      <a hx-get="" hx-swap="outerHTML" hx-target="#body" hx-push-url="true"
         class="inline-flex items-center gap-1.5 text-sm font-medium text-ink-secondary
                hover:text-brand transition-colors duration-200 group shrink-0">
        <svg class="w-4 h-4 transition-transform duration-200 group-hover:-translate-x-0.5"
             fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/>
        </svg>
        <span class="hidden sm:inline">Back to Schedule</span>
      </a>

      <!-- Divider -->
      <div class="h-5 w-px bg-border shrink-0 hidden sm:block"></div>

      <!-- Logo -->
      <a href="/" class="inline-flex items-center gap-2 shrink-0">
        <div class="flex items-end gap-0.75" style="height:20px">
          <div class="wbar bg-brand animate-bar1" style="height:35%;"></div>
          <div class="wbar bg-brand animate-bar2" style="height:65%;"></div>
          <div class="wbar bg-brand animate-bar3" style="height:100%;"></div>
          <div class="wbar bg-brand animate-bar4" style="height:60%;"></div>
          <div class="wbar bg-brand animate-bar5" style="height:30%;"></div>
        </div>
        <span class="font-display text-ink text-[1.3rem] tracking-tight leading-none">Crescendo</span>
      </a>

      <div class="flex-1"></div>

      <!-- Secure badge -->
      <div class="hidden sm:inline-flex items-center gap-1.5 text-xs text-ink-muted
                  bg-surface-alt border border-border-soft rounded-full px-3 py-1.5">
        <svg class="w-3.5 h-3.5 text-green-600" fill="none" viewBox="0 0 24 24"
             stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z"/>
        </svg>
        Secure checkout
      </div>

        <!-- Avatar -->
        <button class="w-9 h-9 rounded-full overflow-hidden border-2 border-white/20 hover:border-white/40 transition-all duration-200 shrink-0" aria-label="Profile">
            <img src="https://i.pravatar.cc/40?img=11" alt="User avatar" class="w-full h-full object-cover" />
        </button>

    </div>
  </div>
</header>


  <!-- ═══════════════════════════════════════════════════════════════════════
       STEP INDICATOR
  ════════════════════════════════════════════════════════════════════════════ -->
  <div class="bg-surface-white border-b border-border-soft">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
      <div class="flex items-center gap-2 max-w-xs mx-auto sm:max-w-sm">
        <!-- Step 1 — done -->
        <div class="step-dot done">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
        <span class="text-xs text-ink-muted mr-1 hidden sm:inline">Tickets</span>
        <div class="step-line done"></div>

        <!-- Step 2 — active -->
        <div class="step-dot active">2</div>
        <span class="text-xs text-brand font-semibold mr-1 hidden sm:inline">Payment</span>
        <div class="step-line"></div>

        <!-- Step 3 — pending -->
        <div class="step-dot pending">3</div>
        <span class="text-xs text-ink-disabled hidden sm:inline">Confirmation</span>
      </div>
    </div>
  </div>


  <!-- ═══════════════════════════════════════════════════════════════════════
       FOOTER
  ════════════════════════════════════════════════════════════════════════════ -->
  <footer class="border-t border-border-soft bg-surface-white mt-12">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
      <div class="flex flex-col sm:flex-row items-center justify-between gap-3">

        <a href="/" class="inline-flex items-center gap-2 shrink-0">
          <div class="flex items-end gap-0.5" style="height:14px">
            <div class="wbar bg-ink-disabled animate-bar1" style="height:35%;"></div>
            <div class="wbar bg-ink-disabled animate-bar2" style="height:65%;"></div>
            <div class="wbar bg-ink-disabled animate-bar3" style="height:100%;"></div>
            <div class="wbar bg-ink-disabled animate-bar4" style="height:60%;"></div>
            <div class="wbar bg-ink-disabled animate-bar5" style="height:30%;"></div>
          </div>
          <span class="font-display text-ink-disabled text-sm tracking-tight">Crescendo</span>
        </a>

        <nav class="flex items-center gap-4 text-xs text-ink-muted">
          <a href="#" class="hover:text-ink transition-colors">Privacy</a>
          <a href="#" class="hover:text-ink transition-colors">Terms</a>
          <a href="#" class="hover:text-ink transition-colors">Refund Policy</a>
          <a href="#" class="hover:text-ink transition-colors">Support</a>
        </nav>

        <p class="text-xs text-ink-disabled">&copy; 2025 Crescendo.</p>
      </div>
    </div>
  </footer>

</body>
